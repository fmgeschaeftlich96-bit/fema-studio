<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nachricht erhalten – FeMa Studio</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" href="favicon.ico" sizes="32x32" />
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=archivo:400,600,700,900|space-grotesk:400,500,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --indigo: #6366f1;
      --violet: #a855f7;
      --cyan: #06b6d4;
      --bg: #05050f;
      --text: #f1f5f9;
      --muted: #64748b;
      --muted-light: #94a3b8;
      --border: rgba(255,255,255,0.07);
    }

    html { height: 100%; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 25% 35%, rgba(99,102,241,0.11) 0%, transparent 60%),
        radial-gradient(ellipse 50% 45% at 78% 60%, rgba(168,85,247,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 40% 50% at 50% 95%, rgba(6,182,212,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .content {
      position: relative;
      text-align: center;
      max-width: 500px;
    }

    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.12));
      border: 1px solid rgba(99,102,241,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }

    .icon svg {
      width: 32px;
      height: 32px;
    }

    h1 {
      font-family: 'Archivo', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #f1f5f9 30%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1rem;
      color: var(--muted-light);
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    .actions {
      display: flex;
      gap: 0.875rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 0.85rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover {
      opacity: 0.88;
      box-shadow: 0 4px 24px rgba(99,102,241,0.35);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      color: var(--muted-light);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.85rem 1.5rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-secondary:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.15);
    }

    .brand {
      margin-top: 3.5rem;
      font-family: 'Archivo', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--muted);
    }
    .brand span {
      background: linear-gradient(90deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <div class="content">

    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#a855f7"/>
          </linearGradient>
        </defs>
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h1>Nachricht erhalten.</h1>

    <p>
      Ich habe deine Anfrage bekommen und melde mich so schnell wie möglich,<br>
      meistens noch am gleichen oder nächsten Werktag.
    </p>

    <div class="actions">
      <a href="/" class="btn-primary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Zurück zur Startseite
      </a>
      <a href="/#beispiele" class="btn-secondary">
        Beispiele ansehen
      </a>
    </div>

    <div class="brand"><span>FeMa</span> Studio</div>
  </div>
</body>
</html>
